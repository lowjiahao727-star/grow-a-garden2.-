<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>购物车</title>

<style>
body{
    font-family:Arial;
    padding:15px;
}

.item{
    background:#f5f5f5;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    margin:3px;
    padding:5px 10px;
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>购物车</h1>

<div id="cart"></div>

<div class="total" id="total"></div>

<button onclick="checkout()">
去付款
</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){

    let html = "";
    let total = 0;

    cart.forEach((item, index) => {

        total += item.price * item.qty;

        html += `
        <div class="item">
            <b>${item.name}</b><br>
            RM${item.price} × ${item.qty}<br>

            <button onclick="add(${index})">➕</button>
            <button onclick="minus(${index})">➖</button>
            <button onclick="del(${index})">🗑</button>
        </div>
        `;
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "总价：RM " + total;

    localStorage.setItem("cart", JSON.stringify(cart));
}

function add(i){
    cart[i].qty++;
    render();
}

function minus(i){
    cart[i].qty--;
    if(cart[i].qty <= 0){
        cart.splice(i,1);
    }
    render();
}

function del(i){
    cart.splice(i,1);
    render();
}

function checkout(){
    window.location.href = "payment.html";
}

render();

</script>

</body>
</html>
