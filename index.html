<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的商城</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* 公告栏 */
.notice-bar{
    width:100%;
    height:40px;
    background:#ff9800;
    color:white;
    overflow:hidden;
    display:flex;
    align-items:center;
}

.notice-text{
    white-space:nowrap;
    padding-left:100%;
    font-weight:bold;
    animation:marquee 15s linear infinite;
}

@keyframes marquee{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}

/* 标题 */
.header{
    background:white;
    text-align:center;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.header h1{
    color:#ff9800;
}

/* Banner */
.banner{
    width:95%;
    height:180px;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 开始购买 */
.start{
    text-align:center;
    margin-top:30px;
}

.start button{
    width:220px;
    height:50px;
    border:none;
    border-radius:30px;
    background:#ff9800;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 公告栏 -->
<div class="notice-bar">
    <div class="notice-text">
        📢 欢迎来到我的商城 ｜ 下单后请上传付款截图 ｜ 营业时间：10:00AM - 10:00PM ｜ 付款后请联系 Facebook Messenger
    </div>
</div>

<!-- 标题 -->
<div class="header">
    <h1>🛒 我的商城</h1>
    <p>欢迎选购商品</p>
</div>

<!-- Banner -->
<div class="banner">
    <img id="banner" src="https://picsum.photos/800/300?1">
</div>

<!-- 开始购买 -->
<div class="start">
    <button onclick="location.href='products.html'">
        开始购买
    </button>
</div>

<script>
const banners = [
    "https://picsum.photos/800/300?1",
    "https://picsum.photos/800/300?2",
    "https://picsum.photos/800/300?3"
];

let i = 0;

setInterval(() => {
    i++;
    if(i >= banners.length){
        i = 0;
    }
    document.getElementById("banner").src = banners[i];
}, 3000);
</script>

</body>
</html>
