<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品列表</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding-bottom:80px;
}

.header{
    background:#ff9800;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.products{
    padding:15px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.name{
    font-size:16px;
    font-weight:bold;
}

.price{
    color:#ff5722;
    margin:8px 0;
    font-size:18px;
}

button{
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    cursor:pointer;
}

.cart-btn{
    position:fixed;
    bottom:15px;
    left:15px;
    right:15px;
}

.cart-btn button{
    height:50px;
    border-radius:30px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="header">
🛒 商品列表
</div>

<div class="products">

    <div class="card">
        <img src="https://picsum.photos/300/200?1">
        <div class="info">
            <div class="name">Steam 礼品卡 RM50</div>
            <div class="price">RM50</div>
            <button onclick="addCart('Steam 礼品卡 RM50',50)">
                加入购物车
            </button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2">
        <div class="info">
            <div class="name">Netflix 一个月</div>
            <div class="price">RM20</div>
            <button onclick="addCart('Netflix 一个月',20)">
                加入购物车
            </button>
        </div>
    </div>

</div>

<div class="cart-btn">
    <button onclick="location.href='cart.html'">
        🛒 查看购物车
    </button>
</div>

<script>
function addCart(name, price) {
    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        name,
        price
    });

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert("已加入购物车");
}
</script>

</body>
</html>
